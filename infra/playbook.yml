---
- name: Setup Hart Metal Production Server
  hosts: production
  become: yes # Виконувати команди від імені root
  vars:
    swap_file_path: /swapfile
    swap_file_size_mb: 4096 # 4 ГБ Swap

  tasks:
    - name: Оновлення кешу apt
      apt:
        update_cache: yes
        cache_valid_time: 3600

    # --- НАЛАШТУВАННЯ SWAP ---
    - name: Перевірка наявності Swap-файлу
      stat:
        path: "{{ swap_file_path }}"
      register: swap_stat

    - name: Створення Swap-файлу (fallocate)
      command: fallocate -l {{ swap_file_size_mb }}M {{ swap_file_path }}
      when: not swap_stat.stat.exists

    - name: Встановлення правильних прав на Swap-файл
      file:
        path: "{{ swap_file_path }}"
        mode: "0600"
      when: not swap_stat.stat.exists

    - name: Ініціалізація Swap (mkswap)
      command: mkswap {{ swap_file_path }}
      when: not swap_stat.stat.exists

    - name: Увімкнення Swap
      command: swapon {{ swap_file_path }}
      when: not swap_stat.stat.exists

    - name: Додавання Swap у /etc/fstab (щоб працював після рестарту)
      mount:
        name: none
        src: "{{ swap_file_path }}"
        fstype: swap
        opts: sw
        passno: 0
        dump: 0
        state: present

    - name: Оптимізація swappiness (використовувати диск лише у крайньому разі)
      sysctl:
        name: vm.swappiness
        value: "10"
        state: present

    # --- НАЛАШТУВАННЯ FIREWALL (UFW) ---
    - name: Дозвіл SSH (з лімітом підключень від брутфорсу)
      ufw:
        rule: limit
        port: "22"
        proto: tcp

    - name: Дозвіл HTTP та HTTPS трафіку
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "80"
        - "443"

    - name: Увімкнення UFW та блокування всього іншого
      ufw:
        state: enabled
        policy: deny

    # --- ВСТАНОВЛЕННЯ DOCKER ---
    - name: Встановлення залежностей для Docker
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Створення директорії для ключів apt
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Додавання офіційного GPG-ключа Docker
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Додавання репозиторію Docker (для Ubuntu 24.04 Noble)
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable"
        state: present

    - name: Встановлення Docker Engine та Compose Plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: latest
        update_cache: yes

    - name: Перевірка, що Docker запущений та в автозавантаженні
      systemd:
        name: docker
        state: started
        enabled: yes
