---
# Деплой flatcraft-стеку: git pull → render .env.prod → CF cert → docker compose up.
# Запускається на --tags deploy (і автоматично у повному run'і).

# ─── 1. Git checkout (потрібен лише compose.prod.yml + Caddyfile) ──────────
- name: Ensure app directory exists and is owned by deploy
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0755"

- name: Clone or update flatcraft repo
  # Чому деплоюємо ВЕСЬ repo: нам потрібен infra/compose/docker-compose.prod.yml
  # і infra/compose/Caddyfile. Образи самі — з ghcr.io, тут лише config-файли.
  # Альтернатива — копіювати config'и через `template`/`copy`; обрали git pull
  # за простоту: одне джерело істини, історія в git, легко rollback.
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: "{{ repo_branch }}"
    accept_hostkey: true
    update: true
  become: true
  become_user: "{{ app_user }}"

# ─── 2. Render .env.prod з vault ───────────────────────────────────────────
- name: Render .env.prod
  # Чому НЕ Ansible-vault encrypt'имо результат: file на сервері — root-only
  # (0600), і повний docker stack має до нього доступ. vault шифрує source-of-truth
  # на git-side; на target держимо plaintext під strict perms.
  ansible.builtin.template:
    src: env.prod.j2
    dest: "{{ app_dir }}/.env.prod"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: "0600"
  notify: Restart flatcraft stack

# ─── 3. Cloudflare Origin Certificate ──────────────────────────────────────
- name: Install CF Origin certificate
  ansible.builtin.copy:
    content: "{{ vault_cf_origin_cert }}"
    dest: "{{ caddy_origin_cert_dir }}/cert.pem"
    owner: root
    group: root
    mode: "0644"
  notify: Restart flatcraft stack

- name: Install CF Origin private key
  ansible.builtin.copy:
    content: "{{ vault_cf_origin_key }}"
    dest: "{{ caddy_origin_cert_dir }}/key.pem"
    owner: root
    group: root
    mode: "0600"
  notify: Restart flatcraft stack

# ─── 4. Docker compose pull + up -d ────────────────────────────────────────
- name: Pull latest images
  # Чому окремо від `up -d`: щоб у разі failure (наприклад, ghcr rate-limit)
  # ми не повалили живий стек — старі образи лишаються запущеними.
  community.docker.docker_compose_v2_pull:
    project_src: "{{ app_dir }}"
    files:
      - "infra/compose/docker-compose.prod.yml"
    env_files:
      - "{{ app_dir }}/.env.prod"
  become: true
  become_user: "{{ app_user }}"

- name: Docker compose up -d (з дампом логів при fatal)
  # Причина обгортки block/rescue: без дампу логів модуль docker_compose_v2
  # повертає лише "container X is unhealthy" без stack-trace застосунку.
  # Інцидент 07.07.2026: 2 послідовні deploy-и падали з цим повідомленням;
  # реальну причину (Zod-помилка на порожньому SENTRY_DSN) знайшли лише через
  # 4 доби через SSH до сервера. Rescue-таск дампить `docker compose logs`
  # трьох app-сервісів у stdout ansible-run'у — регресія такого класу видна
  # одразу у CI-логах без прод-SSH.
  block:
    - name: Docker compose up -d
      community.docker.docker_compose_v2:
        project_src: "{{ app_dir }}"
        files:
          - "infra/compose/docker-compose.prod.yml"
        env_files:
          - "{{ app_dir }}/.env.prod"
        state: present
        remove_orphans: true
        pull: never # вже зробили вище
      become: true
      become_user: "{{ app_user }}"
  rescue:
    - name: Capture service logs on compose failure
      ansible.builtin.shell:
        cmd: |
          docker compose \
            --env-file {{ app_dir }}/.env.prod \
            -f {{ app_dir }}/infra/compose/docker-compose.prod.yml \
            logs {{ item }} --tail=80 2>&1 || true
        executable: /bin/sh
      loop:
        - api
        - web
        - cad-worker
      register: failed_compose_logs
      changed_when: false
      become: true
      become_user: "{{ app_user }}"

    - name: Print captured service logs
      ansible.builtin.debug:
        msg: "{{ item.stdout_lines }}"
      loop: "{{ failed_compose_logs.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Re-raise original compose failure
      ansible.builtin.fail:
        msg: "docker compose up -d failed — service logs dumped above"

- name: Wait until api healthcheck reports healthy
  # Чому: блокуємо повернення Ansible'у успіху до того, як стек реально готовий
  # обслуговувати — наступні tasks (smoke-test з runbook'у) можуть розраховувати на API up.
  ansible.builtin.shell:
    cmd: |
      set -e
      for i in $(seq 1 30); do
        status=$(docker inspect --format '{{ '{{' }}.State.Health.Status{{ '}}' }}' flatcraft-api-1 2>/dev/null || echo missing)
        [ "$status" = "healthy" ] && exit 0
        sleep 2
      done
      echo "api never became healthy" >&2; exit 1
    executable: /bin/sh
  changed_when: false

# ─── 5. Docker image cleanup (старі images > 7 днів) ───────────────────────
# Чому ПІСЛЯ healthcheck'у: prune видаляє ТІЛЬКИ untagged/unused images
# (старі версії, замінені свіжими). Якщо deploy провалився раніше — старий
# стек живе і його images НЕ pruned (`until=168h` фільтр + container-protection).
# Інцидент 2026-06-23: за 5+ deploy'їв накопичились 118 dangling images
# (35.84 GB у /var/lib/docker), диск перейшов 100%, /tmp Python tempfile.mkdtemp
# падав → deploy блокувався. 7 днів — буфер на rollback за один тиждень, але
# короткий достатньо щоб не накопичувати >5 GB на release.
- name: Prune unused Docker images older than 7 days
  community.docker.docker_prune:
    images: true
    images_filters:
      until: 168h
  become: true
  become_user: "{{ app_user }}"
  # Не валимо deploy якщо prune падає (наприклад, конкурентний docker pull):
  # release-success > disk-cleanup. Логуємо вивід для cleanup metrics.
  failed_when: false
  register: flatcraft_prune_result

- name: Report disk space reclaimed
  ansible.builtin.debug:
    msg: >-
      Docker prune freed
      {{ (flatcraft_prune_result.images_space_reclaimed | default(0) / 1024 / 1024) | round(1) }} MB
      ({{ flatcraft_prune_result.images | default([]) | length }} images).
  when: flatcraft_prune_result is defined
