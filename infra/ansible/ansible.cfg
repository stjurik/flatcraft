[defaults]
# Шукаємо ролі за відносним шляхом — щоб запускати `ansible-playbook site.yml`
# з каталогу `infra/ansible/` без додаткових флагів.
roles_path = ./roles
inventory = ./inventory.ini
host_key_checking = True
retry_files_enabled = False
forks = 5
# fact gathering — повне, але кешуємо у пам'яті play'а (для re-run --tags deploy швидше).
gathering = smart
fact_caching = memory
# Лінивий vault: запитує пароль один раз через --ask-vault-pass АБО з ~/.vault_pass.
# Реальний шлях ставимо ENV-перемінною ANSIBLE_VAULT_PASSWORD_FILE на деплой-станції.
stdout_callback = yaml

[ssh_connection]
# pipelining прискорює ~30% викликів — безпечно з простими sudoers (без requiretty).
pipelining = True
# Mux SSH-конекшен на 60с — не відкриваємо новий ssh на кожну task'у.
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30
