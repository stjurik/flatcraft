# docker-compose.yml — локальне середовище для розробки flatcraft.
# Підіймає інфраструктурні сервіси (Postgres, Redis, MinIO, Mailpit).
# Сам код (web/api/cad-worker) запускається через `pnpm dev` локально для швидкого hot-reload.
# Для повного контейнерного запуску — див. docker-compose.prod.yml у Phase 5.

services:
  postgres:
    image: postgres:16-alpine
    container_name: flatcraft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flatcraft}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flatcraft_dev_only_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-flatcraft}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flatcraft} -d ${POSTGRES_DB:-flatcraft}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flatcraft-redis
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: flatcraft-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    # Створює bucket, якщо його ще немає. Виконується один раз і виходить.
    image: minio/mc:latest
    container_name: flatcraft-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_BUCKET: ${S3_BUCKET:-flatcraft-artifacts}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      sleep 3 &&
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY_ID} $${S3_SECRET_ACCESS_KEY} &&
      mc mb --ignore-existing local/$${S3_BUCKET} &&
      mc anonymous set download local/$${S3_BUCKET} &&
      echo 'MinIO bucket ready';
      "

  mailpit:
    # SMTP-сервер для dev. Email-и приходять у веб-інтерфейс на :8025
    image: axllent/mailpit:latest
    container_name: flatcraft-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_data:
  redis_data:
  minio_data:

# Корисні URL після `docker compose up -d`:
#   Postgres:        postgres://flatcraft:flatcraft_dev_only_change_me@localhost:5432/flatcraft
#   Redis:           redis://localhost:6379
#   MinIO API:       http://localhost:9000
#   MinIO Console:   http://localhost:9001  (minioadmin / minioadmin)
#   Mailpit:         http://localhost:8025
