name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Скасовуємо застарілі запуски на тому ж референсі — економить minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.11.0"
  PNPM_VERSION: "9.12.0"

jobs:
  # Валідація самих workflow-файлів (syntax, expressions, shellcheck).
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

  install:
    name: Install + lockfile check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

  lint:
    name: Lint + format
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec eslint . --max-warnings=0
      - run: pnpm exec prettier --check .

  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Unit tests
    needs: install
    runs-on: ubuntu-latest
    # Postgres service для майбутніх integration-тестів @flatcraft/db.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flatcraft
          POSTGRES_PASSWORD: flatcraft_ci_only
          POSTGRES_DB: flatcraft
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flatcraft -d flatcraft"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://flatcraft:flatcraft_ci_only@localhost:5432/flatcraft
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  compose-validate:
    name: Validate prod compose + Caddyfile
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Render .env.prod from example (placeholder values)
        run: cp .env.prod.example .env.prod
      - name: docker compose config
        run: docker compose --env-file .env.prod -f infra/compose/docker-compose.prod.yml config --quiet
      - name: Validate Caddyfile syntax
        # `caddy adapt` парсить Caddyfile у JSON без provisioning TLS-модуля,
        # тому не потребує реальних cert.pem/key.pem (їх кладе Ansible на сервер).
        run: |
          docker run --rm \
            -v "$PWD/infra/compose/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine caddy adapt --config /etc/caddy/Caddyfile > /dev/null

  ansible-validate:
    name: Ansible — syntax-check + ansible-lint
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/ansible
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ansible + ansible-lint
        # Pinned версії — щоб lint-результат не плив між run'ами.
        run: pip install "ansible-core>=2.16,<2.17" "ansible-lint>=24"
      - name: Install required Ansible collections
        run: ansible-galaxy collection install community.general community.docker ansible.posix
      - name: Render example files (щоб vars-resolution не падав)
        run: |
          cp inventory.ini.example inventory.ini
          cp group_vars/all.yml.example group_vars/all.yml
          cp group_vars/all.vault.yml.example group_vars/all.vault.yml
      - name: ansible-playbook --syntax-check
        run: ansible-playbook site.yml --syntax-check
      - name: ansible-lint
        run: ansible-lint --offline

  python:
    name: Python CAD worker (ruff + mypy + pytest)
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/cad
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.13"
          enable-cache: true
      - name: Setup Python
        run: uv python install 3.12
      - name: Sync dev dependencies
        run: uv sync --extra dev
      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Mypy --strict
        run: uv run mypy .
      - name: Pytest з coverage
        run: uv run pytest

  e2e:
    name: Playwright e2e (web + api)
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flatcraft
          POSTGRES_PASSWORD: flatcraft_ci_only
          POSTGRES_DB: flatcraft
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flatcraft -d flatcraft"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://flatcraft:flatcraft_ci_only@localhost:5432/flatcraft
      API_BASE_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Migrate + seed Postgres
        run: |
          pnpm db:migrate
          pnpm db:seed
      - name: Install Playwright browsers
        run: pnpm --filter @flatcraft/web exec playwright install --with-deps chromium
      - name: Run e2e tests
        run: pnpm --filter @flatcraft/web exec playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
