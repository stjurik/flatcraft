# Weekly read-only snapshot Discord community-сервера (ADR-023).
# ЛИШЕ snapshot: apply у CI заборонений — reconcile запускає людина
# локально через `pnpm discord:apply`.
#
# Secrets (repo Settings → Secrets → Actions):
#   DISCORD_BOT_TOKEN — bot token (MANUAL_SETUP.md, крок 1)
#   DISCORD_GUILD_ID  — ID сервера hart.crimea.ua (крок 2)
name: Discord snapshot

on:
  schedule:
    - cron: "0 6 * * 1" # понеділок 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: discord-snapshot
  cancel-in-progress: false

env:
  NODE_VERSION: "20.11.0"
  PNPM_VERSION: "9.12.0"

jobs:
  snapshot:
    name: Snapshot + drift auto-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Pull live state
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
        run: pnpm --filter @flatcraft/discord-tools snapshot

      # Markdown/JSON детерміновані без timestamp — git-diff з'являється
      # ЛИШЕ при реальному drift'і (manual-зміни у Discord UI).
      - name: Auto-commit drift
        run: |
          if [[ -n "$(git status --porcelain docs/discord-config)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add docs/discord-config
            git commit -m "chore(discord): weekly snapshot"
            git push
          else
            echo "Drift відсутній — коміт не потрібен."
          fi
