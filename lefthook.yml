# https://lefthook.dev/configuration/
pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm exec eslint {staged_files} --max-warnings=0
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm typecheck
    format:
      glob: "*.{ts,tsx,js,jsx,json,md,yaml,yml}"
      run: pnpm exec prettier --check {staged_files}
    python-lint:
      glob: "workers/cad/**/*.py"
      run: cd workers/cad && uv run ruff check {staged_files}
    python-types:
      glob: "workers/cad/**/*.py"
      run: cd workers/cad && uv run mypy .

pre-push:
  commands:
    test:
      run: pnpm test
