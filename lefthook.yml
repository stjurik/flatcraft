# https://lefthook.dev/configuration/
pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm exec eslint {staged_files} --max-warnings=0
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm typecheck
    format:
      glob: "*.{ts,tsx,js,jsx,json,md,yaml,yml}"
      run: pnpm exec prettier --check {staged_files}
    python-lint:
      # root: + glob: → lefthook фільтрує staged-файли під workers/cad/ і
      # підставляє у {staged_files} відносні шляхи без префіксу.
      root: "workers/cad/"
      glob: "*.py"
      run: uv run ruff check {staged_files}
    python-types:
      root: "workers/cad/"
      glob: "*.py"
      run: uv run mypy .
    vault-encrypted:
      # Захист: ansible vault файли мають бути зашифровані перед commit.
      # Якщо файл починається не з `$ANSIBLE_VAULT` — fail.
      glob: "infra/ansible/group_vars/all.vault.yml"
      run: |
        for f in {staged_files}; do
          head -1 "$f" | grep -q '^\$ANSIBLE_VAULT' || { echo "ERROR: $f is not ansible-vault-encrypted. Run: ansible-vault encrypt $f"; exit 1; }
        done

pre-push:
  commands:
    test:
      run: pnpm test
